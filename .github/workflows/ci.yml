name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + test deps
        run: pip install -e ".[all]" lttb pytest
      - name: Run tests
        run: pytest tests/ -v

  check-deps:
    name: check-deps smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package (all extras)
        run: pip install -e ".[all]"
      - name: glyph-arts --check-deps
        run: glyph-arts --check-deps
      - name: glyph-arts --check-deps --all
        run: glyph-arts --check-deps --all
      - name: dashboard --check-deps
        run: python -m cli_charts.dashboard --check-deps
